name: if example for develop
on:
 push:
  branches:
   - main
   - develop
jobs:
 dev-deploy:
  if: github.ref_name == 'develop' && github.event_name == 'push'
  runs-on: ubuntu-latest
  steps: 
   - name: Dev-deploy
     run: echo "deploying the application during the push event"
 success_notify:
  needs: dev-deploy
  if: always() && !failure()
  runs-on: ubuntu-latest
  steps:
   - name: Notify success
     run: echo "success email sent to team regarding event"
 failure_notify:
  needs: dev-deploy
  if: failure()
  runs-on: ubuntu-latest
  steps:
   - name: Notify failure
     run: echo "Failure email sent to team regarding event"