name: Outputs B/W two jobs
on: push
jobs:
 build:
  outputs:
    build-version: ${{ steps.S1.outputs.version }}
  runs-on: ubuntu-latest
  steps:
    - name: build step
      id: S1
      run: echo "version=1.0.2" >> $GITHUB_OUTPUT
 deploy:
  needs: build
  runs-on: ubuntu-latest
  steps:
   - name: deploy step
     run: echo "the version taken from build ${{ needs.build.outputs.build-version }}"
