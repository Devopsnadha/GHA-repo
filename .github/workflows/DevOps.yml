name: DevOps Team
on: push 
jobs:
 build:
   runs-on: ubuntu-latest
   steps:
    - name: Build step
      run: echo "Hello Team building the application user, ${{ vars.MY_NAME }}"
 test:
   runs-on: ubuntu-latest
   needs: build
   steps:
    - name: Test step
      run: echo "Tesing the application user, ${{ vars.MY_NAME }}"
 deploy:
   runs-on: ubuntu-latest
   needs: test
   steps:
    - name: Deploy Step
      run: echo "Deploying the application to docker hub, ${{ secrets.DOCKER_PASSWORD}}"
