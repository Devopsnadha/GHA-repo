name: Build & Deploy
on: 
  push:
    branches:
      - main
  pull_request:
   types: 
    - opened
    - synchronize
jobs:
  build:
   if: github.event_name == 'pull_request'
   runs-on: ubuntu-latest
   steps:
     - name: build step
       run: echo "Building the application"
  deploy:
   needs: build
   if: github.event_name == 'push' && github.ref_name == 'main'
   runs-on: ubuntu-latest
   steps:
     - name: deploy step
       run: echo "Deploying the application"
