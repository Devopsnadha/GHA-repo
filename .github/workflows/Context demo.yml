name: Context variable
on: 
push:
 environment:
  description: "to test the environmentes in context variable"
  required: true
  default: "dev"
  type: choice
  options:
   - dev
   - stage
   - prod
jobs:
  context-demo:
    runs-on: ubuntu-latest
    steps:
      - name: context variables
        run: |
         echo "This workflow is trriggered by ${{ github.actor }}"
         echo "The repository name ${{ github.repository }}"
  build-context-demo:
    runs-on: ubuntu-latest
    needs: context-demo
    steps:
      - name: Deploying context variable
        run: echo "Building context variable ${{ github.repository }}" 
  test-context-demo:
    runs-on: ubuntu-latest
    needs: build-context-demo
    steps:
      - name: Deploying context variable
        run: echo "Testing context variable ${{ github.repository }}"
  deploy-context-demo:
    runs-on: ubuntu-latest
    needs: test-context-demo
    steps:
      - name: Deploying context variable
        run: echo "Deploying context variable ${{ github.repository }}"

      - name: print all variables in github
        run: echo " testing the contex ${{ toJson(github) }}"
